<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TS Predictor v0.14alpha</title>

<style>
body { font-family: Arial; }
table { border-collapse: collapse; margin-top: 10px; }
td, th { padding: 4px 6px; border: 1px solid #ccc; text-align: center; }

.good { background: #c8f7c5; }
.mid  { background: #fff3a6; }
.bad  { background: #ffb3b3; }
</style>
</head>

<body>

<h2>Hattrick Team Spirit (TS) Predictor (v0.2605081 – noch nicht kalibriert)</h2>

<label>Start-TS:</label>
<input type="number" id="startTS" value="4.5" step="0.1">

<label>FQ (1–7):</label>
<input type="number" id="fq" value="3" min="0" max="7">

<label>Sportpsychologe (0–5):</label>
<input type="number" id="psy" value="0" min="0" max="5">

<br>
<br>
<label>Pokal-Aus ab:</label>
<select id="cupExit">
    <option value="0">Noch im Pokal</option>
    <option value="1">Runde 1</option>
    <option value="2">Runde 2</option>
    <option value="3">Runde 3</option>
    <option value="4">Runde 4</option>
    <option value="5">Runde 5</option>
    <option value="6">Achtelfinale</option>
    <option value="7">Viertelfinale</option>
    <option value="8">Halbfinale</option>
    <option value="9">Finale</option>
</select>


<p><b>1 Saison: 32 Spiele (16 Wochen × 2 Spiele)</b></p>

<table border="1">
    <thead> <tr> <th># Spiel</th>
            <th>Spieltyp</th>
            <th>TS Einsatz</th>
            <th>TS vorher</th>
            <th>TS nachher</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<script>
const tbody = document.getElementById("table-body");

for (let i = 0; i < 32; i++) {
    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${i + 1}</td>

        <td>
            <select class="type">
                <option value="Liga">Liga</option>
                <option value="Pokal">Pokal</option>
                <option value="Friendly">Friendly</option>
                <option value="Relegation">Relegation</option>
            </select>
        </td>

        <td>
            <select class="action">
                <option value="NORMAL">NORMAL</option>
                <option value="PIC">PIC</option>
                <option value="MOTS">MOTS</option>
            </select>
        </td>

        <td class="before">-</td>
        <td class="after">-</td>
    `;
    tbody.appendChild(row);

}
</script>

</body>
</html>

</table>

<script>

// Inputs
const startTS = document.getElementById("startTS");
const fqInput = document.getElementById("fq");
const psyInput = document.getElementById("psy");
const cupExit = document.getElementById("cup");

// --- Parameter (kalibriert auf mpn-Tabelle) ---

function fqFactor(fq) {

    fq = Math.min(fq, 6);

console.log("fq ist:", fq);
    return {
        high: 0.07 - fq * 0.005, // hohe FQ bremst Zerfall
        low:  0.02 + fq * 0.005  // hohe FQ beschleunigt Erholung
    };
}

function getRuhewert(psy) {
    return Math.min(5.0, 4.5 + psy * 0.1);
}

function getHighFactor(fq) {

    const table = {
        1: 0.09,
        2: 0.075,
        3: 0.055,
        4: 0.045,
        5: 0.035,
        6: 0.03
    };

    return table[Math.min(fq, 6)];
}

function getLowFactor(fq) {

    const table = {
        1: 0.02,
        2: 0.03,
        3: 0.04,
        4: 0.05,
        5: 0.06,
        6: 0.07
    };

    return table[Math.min(fq, 6)];
}

// Drift pro Update

function applyUpdate(ts, ruhe, fq) {

    let factor;

    if (ts > ruhe) {

        // Zerfall von oben
        factor = getHighFactor(fq);

    } else {

        // Erholung von unten
        factor = getLowFactor(fq);
    }

    return ts + (ruhe - ts) * factor;
}

// Spieleffekte (bewusst klassisch gehalten)
function applyMatch(ts, action) {
    if (action === "PIC") {
        ts = ts * 1.33;
    } else if (action === "MOTS") {
        ts = ts / 2;
    }
    return ts;
}

// Realistischere Update-Anzahl
function getUpdates(type) {
    if (type === "Friendly") return 4;
    if (type === "Liga") return 3;
    if (type === "Pokal") return 3;
    if (type === "Relegation") return 3;
    return 3;
}

// Hauptberechnung
function calc() {

    let ts = parseFloat(startTS.value);
    let fq = parseInt(fqInput.value);
    let psy = parseInt(psyInput.value);
    // let cupExits = parseInt(cupExit.value);	

    const types = document.querySelectorAll(".type");
    const actions = document.querySelectorAll(".action");
    const cupExits = document.querySelectorAll(".cupExit");

    const beforeCells = document.querySelectorAll(".before");
    const afterCells = document.querySelectorAll(".after");

	console.log(beforeCells.length, afterCells.length);

    let ruhe = getRuhewert(psy);
    let factor = fqFactor(fq);

    for (let i = 0; i < 32; i++) {

        // Drift vor Spiel
        let updates = getUpdates(types[i].value);

	    for (let j = 0; j < updates; j++) {
		    ts = applyUpdate(ts, ruhe, fq);
	}

        let tsBefore = ts;

        let action = actions[i].value;
        let type = types[i].value;

        // Friendly → immer NORMAL
        let effectiveAction = (type === "Friendly") ? "NORMAL" : action;

        // Spiel anwenden
        ts = applyMatch(ts, effectiveAction);

        // Clamp
        ts = Math.max(0.5, Math.min(10.0, ts));

        let tsAfter = ts;

        // Ausgabe
        beforeCells[i].innerText = tsBefore.toFixed(2);
        afterCells[i].innerText = tsAfter.toFixed(2);

        // Farbe
        afterCells[i].className = "after";

        if (ts >= 4 && ts <= 6) afterCells[i].classList.add("good");
        else if (ts >= 3) afterCells[i].classList.add("mid");
        else afterCells[i].classList.add("bad");
    }

}
    // let cupExit = cupExit[i].value;

// Events
document.querySelectorAll("select").forEach(el => el.addEventListener("change", calc));
startTS.addEventListener("input", calc);
fqInput.addEventListener("input", calc);
psyInput.addEventListener("input", calc);

// Initial
calc();

    for (let i = 0; i < 32; i++) {

	    if (i % 2 === 0) {
		    if ( cupExits > i  )
		    {
			// Midweek
			types[i].value = "Friendly";
		    }
		    else
		    {
			types[i].value = "Pokal";
		    }
	    } else {
		// Wochenende
		types[i].value = "Liga";
	    }
		types[28].value = "Friendly";
		types[29].value = "Relegation";
		types[30].value = "Friendly";
		types[31].value = "Friendly";
    }
</script>

</body>
</html>
